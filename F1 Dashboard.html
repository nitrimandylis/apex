  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

5,255,255,0.08); background:rgba(255,255,255,0.025); backdrop-filter:blur(18px); padding:26px 28px\">\n        <div style=\"font-size:11px; font-weight:700; letter-spacing:0.2em; color:rgba(245,243,241,0.5); margin-bottom:18px\">WORLD CHAMPIONS · LAST 10 YEARS<\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; gap:5px\">\n          <sc-for list=\"{{ champions }}\" as=\"c\" hint-placeholder-count=\"10\">\n            <div style=\"display:flex; align-items:center; gap:14px; padding:8px 14px; border-radius:12px\" style-hover=\"background:rgba(255,255,255,0.04)\">\n              <div style=\"width:44px; font-size:13px; font-weight:700; color:rgba(245,243,241,0.4)\">{{ c.year }}<\u002Fdiv>\n              <div style=\"width:3px; height:16px; border-radius:99px; background:{{ c.color }}\"><\u002Fdiv>\n              <div style=\"font-size:14.5px; font-weight:500\">{{ c.name }}<\u002Fdiv>\n              <div style=\"flex:1\"><\u002Fdiv>\n              <div style=\"font-size:12.5px; color:rgba(245,243,241,0.45)\">{{ c.team }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<x-import component-from-global-scope=\"image-slot\" style=\"display:none\" hint-size=\"0,0\"><\u002Fx-import>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;liveDemo&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Telemetry&quot;},&quot;favoriteDriver&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;Hamilton&quot;,&quot;options&quot;:[&quot;None&quot;,&quot;Antonelli&quot;,&quot;Russell&quot;,&quot;Hamilton&quot;,&quot;Leclerc&quot;,&quot;Norris&quot;,&quot;Piastri&quot;,&quot;Verstappen&quot;,&quot;Alonso&quot;],&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Personalization&quot;},&quot;startView&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;overview&quot;,&quot;options&quot;:[&quot;overview&quot;,&quot;calendar&quot;,&quot;standings&quot;,&quot;telemetry&quot;,&quot;history&quot;],&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Navigation&quot;}}\">\nclass Component extends DCLogic {\n  state = { view: this.props.startView ?? 'overview', now: Date.now(), live: false, t: 0 };\n\n  componentDidMount() {\n    this.clock = setInterval(() => this.setState({ now: Date.now() }), 1000);\n    this.sim = setInterval(() => { if (this.isLive()) this.setState(s => ({ t: s.t + 1 })); }, 130);\n  }\n  componentWillUnmount() { clearInterval(this.clock); clearInterval(this.sim); }\n\n  isLive() { return this.state.live || (this.props.liveDemo ?? false); }\n\n  teamColor(key) {\n    return ({ mer: '#00D2BE', fer: '#E8002D', mcl: '#FF8000', rbr: '#3671C6', alp: '#0090FF', rb: '#6692FF', haa: '#B6BABD', wil: '#64C4FF', aud: '#F50537', amr: '#229971', cad: '#C5A253' })[key];\n  }\n\n  driverData() {\n    return [\n      ['Kimi Antonelli', 'Mercedes', 'mer', 179], ['George Russell', 'Mercedes', 'mer', 154],\n      ['Lewis Hamilton', 'Ferrari', 'fer', 147], ['Charles Leclerc', 'Ferrari', 'fer', 108],\n      ['Lando Norris', 'McLaren', 'mcl', 97], ['Oscar Piastri', 'McLaren', 'mcl', 82],\n      ['Max Verstappen', 'Red Bull', 'rbr', 76], ['Isack Hadjar', 'Red Bull', 'rbr', 52],\n      ['Pierre Gasly', 'Alpine', 'alp', 35], ['Liam Lawson', 'Racing Bulls', 'rb', 33],\n      ['Arvid Lindblad', 'Racing Bulls', 'rb', 26], ['Franco Colapinto', 'Alpine', 'alp', 25],\n      ['Esteban Ocon', 'Haas', 'haa', 13], ['Oliver Bearman', 'Haas', 'haa', 8],\n      ['Carlos Sainz', 'Williams', 'wil', 7], ['Nico Hulkenberg', 'Audi', 'aud', 5],\n      ['Alex Albon', 'Williams', 'wil', 4], ['Fernando Alonso', 'Aston Martin', 'amr', 1],\n      ['Gabriel Bortoleto', 'Audi', 'aud', 1], ['Lance Stroll', 'Aston Martin', 'amr', 0],\n      ['Sergio Perez', 'Cadillac', 'cad', 0], ['Valtteri Bottas', 'Cadillac', 'cad', 0],\n    ];\n  }\n\n  raceData() {\n    // [round, gp, circuit, date, status, winner, winnerTeam]\n    return [\n      [1, 'Australian GP', 'Melbourne', '6–8 Mar', 'done', 'Russell', 'mer'],\n      [2, 'Chinese GP', 'Shanghai', '13–15 Mar', 'done', 'Antonelli', 'mer'],\n      [3, 'Japanese GP', 'Suzuka', '27–29 Mar', 'done', 'Antonelli', 'mer'],\n      [4, 'Miami GP', 'Miami', '1–3 May', 'done', 'Antonelli', 'mer'],\n      [5, 'Canadian GP', 'Montreal', '22–24 May', 'done', 'Antonelli', 'mer'],\n      [6, 'Monaco GP', 'Monte Carlo', '5–7 Jun', 'done', 'Antonelli', 'mer'],\n      [7, 'Barcelona-Catalunya GP', 'Barcelona', '12–14 Jun', 'done', 'Hamilton', 'fer'],\n      [8, 'Austrian GP', 'Spielberg', '26–28 Jun', 'done', 'Russell', 'mer'],\n      [9, 'British GP', 'Silverstone', '3–5 Jul', 'done', 'Leclerc', 'fer'],\n      [10, 'Belgian GP', 'Spa-Francorchamps', '17–19 Jul', 'next', null, null],\n      [11, 'Hungarian GP', 'Budapest', '24–26 Jul', 'up', null, null],\n      [12, 'Dutch GP', 'Zandvoort', '21–23 Aug', 'up', null, null],\n      [13, 'Italian GP', 'Monza', '4–6 Sep', 'up', null, null],\n      [14, 'Madrid GP', 'Madrid', '11–13 Sep', 'up', null, null],\n      [15, 'Azerbaijan GP', 'Baku', '24–26 Sep', 'up', null, null],\n      [16, 'Singapore GP', 'Marina Bay', '9–11 Oct', 'up', null, null],\n      [17, 'United States GP', 'Austin', '23–25 Oct', 'up', null, null],\n      [18, 'Mexico City GP', 'Mexico City', '30 Oct–1 Nov', 'up', null, null],\n      [19, 'Sao Paulo GP', 'Interlagos', '6–8 Nov', 'up', null, null],\n      [20, 'Las Vegas GP', 'Las Vegas', '19–21 Nov', 'up', null, null],\n      [21, 'Qatar GP', 'Lusail', '27–29 Nov', 'up', null, null],\n      [22, 'Abu Dhabi GP', 'Yas Marina', '4–6 Dec', 'up', null, null],\n    ];\n  }\n\n  renderVals() {\n    const pad = (n) => String(n).padStart(2, '0');\n    const view = this.state.view;\n    const setView = (v) => () => this.setState({ view: v });\n\n    const navItems = ['overview|Overview', 'calendar|Calendar', 'standings|Standings', 'telemetry|Telemetry', 'history|History'].map(s => {\n      const [key, label] = s.split('|');\n      const active = view === key;\n      return {\n        key, label, go: setView(key),\n        bg: active ? 'rgba(255,255,255,0.06)' : 'transparent',\n        color: active ? '#F5F3F1' : 'rgba(245,243,241,0.58)',\n        dot: active ? '#E10600' : 'rgba(245,243,241,0.18)',\n        dotGlow: active ? '0 0 10px rgba(225,6,0,0.8)' : 'none',\n      };\n    });\n\n    // Countdown to Belgian GP lights out: Sun 19 Jul 2026, 15:00 CEST = 13:00 UTC\n    const target = Date.UTC(2026, 6, 19, 13, 0, 0);\n    const diff = Math.max(0, target - this.state.now);\n    const cdDays = pad(Math.floor(diff / 86400000));\n    const cdHours = pad(Math.floor(diff / 3600000) % 24);\n    const cdMins = pad(Math.floor(diff / 60000) % 60);\n    const cdSecs = pad(Math.floor(diff / 1000) % 60);\n\n    // Live telemetry simulation (deterministic from tick t)\n    const t = this.state.t;\n    const clamp = (v, a, b) => Math.min(b, Math.max(a, v));\n    const speed = clamp(Math.round(232 + 88 * Math.sin(t / 7.3) + 16 * Math.sin(t / 1.9)), 74, 338);\n    const gear = speed < 90 ? 2 : speed < 130 ? 3 : speed < 170 ? 4 : speed < 215 ? 5 : speed < 262 ? 6 : speed < 305 ? 7 : 8;\n    const throttle = clamp(Math.round(60 + 46 * Math.sin(t / 7.3 + 0.5)), 0, 100);\n    const brake = throttle < 28 ? clamp(Math.round(72 + 24 * Math.sin(t / 3.1)), 0, 100) : 0;\n    const lap = 12 + Math.floor(t / 320);\n    const lapSec = (44.2 + 1.9 * Math.sin(t / 47)).toFixed(3);\n    const lastLap = '1:' + lapSec;\n\n    const liveOrder = [\n      ['ANT', 'Mercedes', 'mer', 0, 'M'], ['HAM', 'Ferrari', 'fer', 1.2, 'M'],\n      ['RUS', 'Mercedes', 'mer', 2.9, 'H'], ['LEC', 'Ferrari', 'fer', 5.4, 'M'],\n      ['NOR', 'McLaren', 'mcl', 8.8, 'S'], ['VER', 'Red Bull', 'rbr', 12.5, 'M'],\n      ['PIA', 'McLaren', 'mcl', 15.1, 'H'], ['HAD', 'Red Bull', 'rbr', 21.6, 'M'],\n      ['GAS', 'Alpine', 'alp', 28.4, 'S'], ['LAW', 'Racing Bulls', 'rb', 33.2, 'M'],\n    ];\n    const tyreColors = { S: '#FF564E', M: '#FFD12E', H: '#F5F3F1' };\n    const liveRows = liveOrder.map((r, i) => ({\n      pos: i + 1, code: r[0], team: r[1], color: this.teamColor(r[2]),\n      tyre: r[4], tyreColor: tyreColors[r[4]],\n      gap: i === 0 ? 'Leader' : '+' + (r[3] + 0.45 * Math.sin(t / 9 + i * 1.7)).toFixed(2),\n      bg: i === 0 ? 'rgba(225,6,0,0.07)' : 'rgba(255,255,255,0.02)',\n    }));\n\n    const fav = this.props.favoriteDriver ?? 'None';\n    const leaderPts = 179;\n    const drivers = this.driverData().map((d, i) => {\n      const isFav = fav !== 'None' && d[0].includes(fav);\n      return {\n        pos: i + 1, name: d[0], team: d[1], color: this.teamColor(d[2]), pts: d[3],\n        gap: i === 0 ? '—' : '-' + (leaderPts - d[3]),\n        bg: isFav ? 'rgba(225,6,0,0.09)' : (i % 2 === 0 ? 'rgba(255,255,255,0.025)' : 'transparent'),\n        border: isFav ? 'rgba(225,6,0,0.4)' : 'transparent',\n      };\n    });\n    const topFive = drivers.slice(0, 5);\n\n    const teamPts = [['Mercedes', 'mer', 333], ['Ferrari', 'fer', 255], ['McLaren', 'mcl', 179], ['Red Bull', 'rbr', 128], ['Alpine', 'alp', 60], ['Racing Bulls', 'rb', 59], ['Haas', 'haa', 21], ['Williams', 'wil', 11], ['Audi', 'aud', 6], ['Aston Martin', 'amr', 1], ['Cadillac', 'cad', 0]];\n    const teams = teamPts.map((tm, i) => ({\n      pos: i + 1, name: tm[0], pts: tm[2], color: this.teamColor(tm[1]),\n      barW: Math.max(1, Math.round(tm[2] / 333 * 100)) + '%',\n    }));\n\n    const races = this.raceData().map(r => {\n      const next = r[4] === 'next';\n      const done = r[4] === 'done';\n      return {\n        round: pad(r[0]), gp: r[1], circuit: r[2], date: r[3],\n        bg: next ? 'rgba(225,6,0,0.07)' : 'rgba(255,255,255,0.025)',\n        border: next ? 'rgba(225,6,0,0.4)' : 'rgba(255,255,255,0.06)',\n        opacity: done ? '0.68' : '1',\n        tag: done ? 'WINNER · ' + r[5].toUpperCase() : next ? 'NEXT · LIGHTS OUT SUN 15:00' : 'UPCOMING',\n        tagDot: done ? this.teamColor(r[6]) : next ? '#E10600' : 'rgba(245,243,241,0.2)',\n        tagColor: done ? 'rgba(245,243,241,0.75)' : next ? '#FF564E' : 'rgba(245,243,241,0.4)',\n      };\n    });\n\n    const lastPodium = [\n      { pos: 1, name: 'Charles Leclerc', color: this.teamColor('fer'), time: '1:28:41.3' },\n      { pos: 2, name: 'George Russell', color: this.teamColor('mer'), time: '+4.882' },\n      { pos: 3, name: 'Lewis Hamilton', color: this.teamColor('fer'), time: '+7.115' },\n    ];\n\n    const winsData = [['Kimi Antonelli', 'mer', 5], ['George Russell', 'mer', 2], ['Lewis Hamilton', 'fer', 1], ['Charles Leclerc', 'fer', 1]];\n    const winsBars = winsData.map(w => ({ name: w[0], wins: w[2], color: this.teamColor(w[1]), barW: Math.round(w[2] / 5 * 100) + '%' }));\n\n    const champYears = [['2025', 'Lando Norris', 'McLaren', 'mcl'], ['2024', 'Max Verstappen', 'Red Bull', 'rbr'], ['2023', 'Max Verstappen', 'Red Bull', 'rbr'], ['2022', 'Max Verstappen', 'Red Bull', 'rbr'], ['2021', 'Max Verstappen', 'Red Bull', 'rbr'], ['2020', 'Lewis Hamilton', 'Mercedes', 'mer'], ['2019', 'Lewis Hamilton', 'Mercedes', 'mer'], ['2018', 'Lewis Hamilton', 'Mercedes', 'mer'], ['2017', 'Lewis Hamilton', 'Mercedes', 'mer'], ['2016', 'Nico Rosberg', 'Mercedes', 'mer']];\n    const champions = champYears.map(c => ({ year: c[0], name: c[1], team: c[2], color: this.teamColor(c[3]) }));\n\n    const titles = { overview: 'Overview', calendar: 'Race calendar', standings: 'Championship standings', telemetry: 'Live telemetry', history: 'History' };\n    const liveOn = this.isLive();\n\n    return {\n      navItems, viewTitle: titles[view],\n      isOverview: view === 'overview', isCalendar: view === 'calendar', isStandings: view === 'standings',\n      isTelemetry: view === 'telemetry', isHistory: view === 'history',\n      goTelemetry: setView('telemetry'), goCalendar: setView('calendar'), goStandings: setView('standings'),\n      cdDays, cdHours, cdMins, cdSecs,\n      liveOn, liveOff: !liveOn,\n      toggleLive: () => this.setState(s => ({ live: !this.isLive() })),\n      speed, gear, throttle, brake, throttlePct: throttle + '%', brakePct: brake + '%',\n      lapLabel: lap + ' / 44', lastLap, carLabel: 'CAR 12 · ANTONELLI',\n      liveRows, drivers, topFive, teams, races, lastPodium, winsBars, champions,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
